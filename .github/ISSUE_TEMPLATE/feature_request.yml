name: "✨ Feature Request"
description: "기존 컴포넌트 개선 또는 새 기능 제안"
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: "관련 컴포넌트"
      description: "기존 컴포넌트 개선이면 선택, 새 기능이면 '기타' 선택"
      options:
        - Button
        - Badge
        - Input
        - Textarea
        - Checkbox
        - Switch
        - Select
        - Combobox
        - Slider
        - DatePicker
        - Label
        - Field
        - Card
        - Table
        - Tabs
        - Accordion
        - Dialog
        - Drawer
        - Popover
        - Tooltip
        - Menu
        - Toast
        - Progress
        - Avatar
        - Separator
        - Skeleton
        - ThemeProvider
        - 기타
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "기능 설명"
      description: "어떤 기능이 필요한가요?"
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: "사용 사례"
      description: "이 기능이 필요한 상황을 설명해주세요."
    validations:
      required: true
