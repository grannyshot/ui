name: "\U0001F41B Bug Report"
description: "컴포넌트 버그 또는 스타일 문제 신고"
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: "컴포넌트"
      description: "어떤 컴포넌트에서 발생하나요?"
      options:
        - Button
        - Badge
        - Input
        - Textarea
        - Checkbox
        - Switch
        - Select
        - Combobox
        - Slider
        - DatePicker
        - Label
        - Field
        - Card
        - Table
        - Tabs
        - Accordion
        - Dialog
        - Drawer
        - Popover
        - Tooltip
        - Menu
        - Toast
        - Progress
        - Avatar
        - Separator
        - Skeleton
        - ThemeProvider
        - 기타
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "버그 설명"
      description: "어떤 문제가 발생하나요?"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "재현 방법"
      description: "버그를 재현할 수 있는 단계를 알려주세요."
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "기대 동작"
      description: "어떻게 동작해야 하나요?"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "패키지 버전"
      placeholder: "0.1.0"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "추가 정보"
      description: "스크린샷, 브라우저 정보, OS 등"
    validations:
      required: false
